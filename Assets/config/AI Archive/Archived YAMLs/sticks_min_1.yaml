behaviors:
  SticksBot:
    trainer_type: ppo
    hyperparameters:
      batch_size: 32
      buffer_size: 256
      learning_rate: 3.0e-4
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 64
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    self_play:
      window: 10
      play_against_latest_model_ratio: 0.5
      save_steps: 2000
      swap_steps: 1000
      team_change: 3000
    max_steps: 15000
    time_horizon: 64
    summary_freq: 2000
    checkpoint_interval: 5000